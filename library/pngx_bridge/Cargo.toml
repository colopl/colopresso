[package]
name = "pngx_bridge"
version = "0.0.0"
edition = "2021"
publish = false
description = "Rust bridge for PNGX encoding in colopresso"
license = "GPL-3.0-or-later"
repository = "https://github.com/colopl/colopresso"

[lib]
crate-type = ["staticlib", "cdylib"]
name = "pngx_bridge"

[features]
default = []
rayon = ["dep:rayon", "oxipng/parallel", "imagequant/threads"]

# WASM builds without threading
wasm-bindgen = ["dep:wasm-bindgen", "oxipng/freestanding"]

[dependencies]
rayon = { version = "1.12.0", optional = true }
wasm-bindgen = { version = "0.2.118", optional = true }

[dependencies.oxipng]
version = "10.1.0"
default-features = false
features = ["zopfli", "freestanding"]

[dependencies.imagequant]
version = "4.4.1"
default-features = false

[build-dependencies]
cbindgen = "0.29.2"
